<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Proyecto Kodland</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="formulario">

        <h2>Responda a estas preguntas sobre sus hábitos diarios.</h2>

        <!-- ATMOSPHERE -->
        <label>¿Cómo te desplazas habitualmente?</label>
        <select id="transporte">
            <option value="eco">Caminar / Bicicleta</option>
            <option value="medio">Transporte público</option>
            <option value="alto">Vehículo privado</option>
        </select>

        <label>¿Dejas las luces o los aparatos encendidos innecesariamente?</label>
        <select id="energia">
            <option value="bajo">Nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Siempre</option>
        </select>

        <label>¿Quemas basura?</label>
        <select id="quema">
            <option value="bajo">Nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Siempre</option>
        </select>

        <!-- RESIDUES -->
        <label>¿Con qué frecuencia utilizas plásticos de un solo uso?</label>
        <select id="plastico">
            <option value="bajo">Nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Siempre</option>
        </select>

        <label>¿Reciclas tus residuos?</label>
        <select id="reciclaje">
            <option value="alto">Siempre</option>
            <option value="medio">A veces</option>
            <option value="bajo">Nunca</option>
        </select>

        <!-- ECOSYSTEM -->
        <label>¿Con qué frecuencia consumes carne?</label>
        <select id="comida">
            <option value="bajo">Casi nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Frecuentemente</option>
        </select>

        <!-- WATER -->
        <label>¿Desperdicias agua?</label>
        <select id="agua">
            <option value="bajo">Nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Siempre</option>
        </select>

        <label>¿Desecha usted los productos químicos de forma inadecuada?</label>
        <select id="quimicos">
            <option value="bajo">Nunca</option>
            <option value="medio">A veces</option>
            <option value="alto">Siempre</option>
        </select>

        <button onclick="analizar()">Analyze</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
